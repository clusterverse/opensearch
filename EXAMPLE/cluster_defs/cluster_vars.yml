---

redeploy_schemes_supported: ['_scheme_addallnew_rmdisk_rollback']
redeploy_scheme: "_scheme_addallnew_rmdisk_rollback"
canary: none
canary_tidy_on_success: true

update_os: true                                         # A variable passed to the cloud-init user-data script (or the startup-script for GCP), to indicate that it can run any user-defined run_cmd (apt-get -y dist-upgrade).

app_name: "opensearch-{{lookup('pipe', 'whoami') | lower}}"      # The name of the application cluster (e.g. 'couchbase', 'nginx'); becomes part of cluster_name.  Provided is a default to ensure no accidental overwriting.

cluster_name: "{{app_name}}-{{buildenv}}"               # Identifies the cluster within the cloud environment; becomes part of the hostname

cluster_vars:
  custom_tagslabels:
    environment: "{{buildenv}}"
    owner: "{{ lookup('pipe', 'whoami') | lower }}"
