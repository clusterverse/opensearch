---

# A list of CIDRs from which to allow SSH access
ssh_whitelist: ['10.0.0.0/8']

# Create a shortened region name (e.g. 'us-west-2' -> 'usw2')
region_short: "{{region | regex_replace('(\\w+)-(n(?=orth)|s(?=outh)|e(?=ast)|w(?=est)|c(?=entral))(?:\\w+?)(e(?=ast)|w(?=est))?(?:(?:ast)|(?:est))?-(\\d)', '\\1\\2\\3\\4') | lower }}"

cluster_vars:
  dns_cloud_internal_domain: "{{region}}.compute.internal"          # The cloud-internal zone as defined by the cloud provider (e.g. GCP, AWS)
  dns_nameserver_zone: ""                                           # The apex zone that dns_server will operate on.  gcloud dns needs a trailing '.'.  Leave blank if no external DNS (use IPs only)
  dns_subdomain: "{{cloud_type}}-{{region_short}}.{{buildenv}}"     # A user-defined subdomain part of the FDQN, (e.g. if more labels are required before the dns_nameserver_zone)
  # dns_domain: (composed of dns_subdomain.dns_nameserver_zone) is defined in clusterverse/clusterverse/roles/_dependencies/defaults/main.yml
  dns_server: "route53"                                             # Specify DNS server. nsupdate, route53 or clouddns.  If empty string is specified, no DNS will be added.
  assign_public_ip: false                                           # Whether a 'dynamic' (will change on stop/start), 'static' (e.g. elastic IP), or no public IP should be assigned.   NOTE: for Azure 'Standard' instance types, only static IPs are supported
  inventory_ip: "private"                                           # 'public' or 'private', (private in case we're operating in a private LAN).  If public, 'assign_public_ip' must be 'static' or 'dynamic'
  instance_profile_name: ""
  user_data: |-
    #cloud-config
    system_info: { default_user: { name: ansible } }
#    swap: { filename: /swap.img, size: auto, maxsize: 4G }
  secgroups_existing: []
  secgroup_new:
    - proto: "tcp"
      ports: ["22"]
      cidr_ip: "{{ssh_whitelist}}"
      rule_desc: "SSH Access"
    - proto: "tcp"
      ports: ["{{dashboards_port | default(5601)}}"]
      cidr_ip: "{{ssh_whitelist}}"
      rule_desc: "{{ cluster_name }} Dashboards UI access"
    - proto: all
      group_name: ["{{cluster_name}}-sg"]
      rule_desc: "Access from all VMs attached to the {{ cluster_name }}-sg group"
